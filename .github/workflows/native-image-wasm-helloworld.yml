name: native-image/wasm-helloworld
on:
  push:
    paths:
      - 'native-image/wasm-helloworld/**'
      - '.github/workflows/native-image-wasm-helloworld.yml'
  pull_request:
    paths:
      - 'native-image/wasm-helloworld/**'
      - '.github/workflows/native-image-wasm-helloworld.yml'
  schedule:
    - cron: "0 0 1 * *" # run every month
  workflow_dispatch:
permissions:
  contents: read
jobs:
  run:
    name: Run 'native-image/wasm-helloworld'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        java-version: ['25-ea']
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'
      - name: Set up Binaryen
        run: |
          curl -sLO https://github.com/WebAssembly/binaryen/releases/download/version_122/binaryen-version_122-x86_64-linux.tar.gz
          tar xzf binaryen-version_122-x86_64-linux.tar.gz
          echo "$(pwd)/binaryen-version_122/bin" >> "$GITHUB_PATH"
      - name: Build 'native-image/wasm-helloworld'
        run: |
          cd native-image/wasm-helloworld
          javac HelloWasm.java
          native-image --tool:svm-wasm HelloWasm
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run 'native-image/wasm-helloworld'
        run: |
          cd native-image/wasm-helloworld
          node hellowasm.js