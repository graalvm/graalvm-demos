name: web-image/hello-wasm
on:
  push:
    paths:
      - 'web-image/hello-wasm/**'
      - '.github/workflows/web-image-hellowasm.yml'
  pull_request:
    paths:
      - 'web-image/hello-wasm/**'
      - '.github/workflows/web-image-hellowasm.yml'
  schedule:
    - cron: "0 0 1 * *"  # run every month
  workflow_dispatch:
permissions:
  contents: read
jobs:
  run:
    name: Run 'web-image/hello-wasm'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        java-version: ['25e1-ea']
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Set up Binaryen
        run: |
          curl -sLO https://github.com/WebAssembly/binaryen/releases/download/version_122/binaryen-version_122-x86_64-linux.tar.gz
          tar xzf binaryen-version_122-x86_64-linux.tar.gz
          echo "$(pwd)/binaryen-version_122/bin" >> "$GITHUB_PATH"
      - name: Run 'native-image/web-image/hello-wasm'
        run: |
          cd web-image/hello-wasm
          javac HelloWasm.java
          native-image --tool:svm-wasm HelloWasm
          node --experimental-wasm-exnref hellowasm.js
          jwebserver -p 8000 &
          SERVER_PID=$!
          sleep 5
          curl -i http://127.0.0.1:8000
          kill $SERVER_PID