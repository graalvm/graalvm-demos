name: microservices/micronaut-hello-rest-gradle
on:
  push:
    paths:
      - 'native-image/microservices/micronaut-hello-rest-gradle/**'
      - '.github/workflows/microservices-micronaut-hello-rest-gradle.yml'
  schedule:
    - cron: "0 0 1 * *" # run every month
  workflow_dispatch:
permissions:
  contents: read
jobs:
  run:
    name: Run 'microservices/micronaut-hello-rest-gradle'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'gradle'
          native-image-job-reports: 'true'
      - name: Run 'microservices/micronaut-hello-rest-gradle'
        run: |
          set -euo pipefail
          cd native-image/microservices/micronaut-hello-rest-gradle

          wait_for_container() {
            local port="$1"
            local attempts=30

            while (( attempts > 0 )); do
              if response=$(curl --silent --show-error --fail "http://localhost:${port}/GraalVM"); then
                [ "$response" = "Hello GraalVM" ]
                return 0
              fi
              attempts=$((attempts - 1))
              sleep 1
            done

            echo "Timed out waiting for container on port ${port}" >&2
            return 1
          }

          run_container_check() {
            local image="$1"
            local port="$2"

            container_id=$(docker run --rm -d -p"${port}":8080 "$image")
            trap 'docker kill "$container_id" 2>/dev/null || true' EXIT
            wait_for_container "$port"
            docker kill "$container_id"
            trap - EXIT
          }

          ./gradlew build

          # JVM and native executable flows
          ./run.sh

          # Docker: Default Containers
          ./gradlew dockerBuild
          run_container_check hello:latest 8081

          ./gradlew dockerBuildNative
          run_container_check hello:latest 8082

          # Docker: Custom Containers
          docker build --no-cache . -f Dockerfile.jvm -t micronaut:hello.jvm
          run_container_check micronaut:hello.jvm 8083

          docker build --no-cache . -f Dockerfile.native -t micronaut:hello
          run_container_check micronaut:hello 8084

          docker images | grep micronaut
